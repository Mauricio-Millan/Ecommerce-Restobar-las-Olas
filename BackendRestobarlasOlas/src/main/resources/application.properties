spring.application.name=BackendRestobarlasOlas

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

server.servlet.context-path=/restobarswagger

# ============================================
# SUPABASE / PostgreSQL Connection
# ============================================
spring.datasource.url=jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:5432/postgres?sslmode=require&serverTimezone=America/Lima
spring.datasource.username=postgres.rlirstxwbmvfkqrbeogl
spring.datasource.password=integrador2026
spring.datasource.driverClassName=org.postgresql.Driver

# ============================================
# HikariCP Connection Pool (Optimizado para Supabase)
# ============================================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.connection-test-query=SELECT 1

# ============================================
# Supabase JWT
# ============================================
app.security.supabase.issuer=https://rlirstxwbmvfkqrbeogl.supabase.co/auth/v1
app.security.supabase.jwk-set-uri=https://rlirstxwbmvfkqrbeogl.supabase.co/auth/v1/.well-known/jwks.json
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${app.security.supabase.jwk-set-uri}

# ============================================
# JPA / Hibernate Configuration
# LAS TABLAS YA EXISTEN EN SUPABASE
# ============================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

# ============================================
# Logging
# ============================================
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
