# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy JAR app to Azure Web App - BackRestobarlasOLas

on:
  push:
    branches:
      - main
    paths:
      - 'BackendRestobarlasOlas/**' # Restringe la ejecución solo a cambios en el backend
  workflow_dispatch:

env:
  WORKING_DIRECTORY: 'BackendRestobarlasOlas'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read # Required for actions/checkout

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'
          cache: 'maven' # Optimización de velocidad: Cachea las dependencias de Maven m2

      # CORRECCIÓN 1: Ejecución de Maven alterando el contexto del directorio de trabajo
      - name: Build with Maven
        run: mvn clean install -DskipTests
        working-directory: ${{ env.WORKING_DIRECTORY }}

      # CORRECCIÓN 2: Ajuste de la ruta del artefacto empaquetado (.jar)
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: ${{ github.workspace }}/${{ env.WORKING_DIRECTORY }}/target/*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout
  
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_7ACDB1E46F6C477085AFB2F0606EE6D9 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_ABB2FE20AF1441C98314B01182B3846C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_14FE2C8FAF7F4E39BEBFC68EC923B9C1 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'BackRestobarlasOLas'
          slot-name: 'Production'
          package: '*.jar'
          