# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and Deploy Monolith (Spring Boot + Angular) to Azure Web App

on:
  push:
    branches:
      - main
    paths:
      - 'BackendRestobarlasOlas/**'
      - 'FrontendRestobarlasOlas/**'
  workflow_dispatch:

env:
  BACKEND_DIR: 'BackendRestobarlasOlas'
  FRONTEND_DIR: 'FrontendRestobarlasOlas'
  AZURE_WEBAPP_NAME: 'BackRestobarlasOLas'

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ==========================================
      # FASE 1: COMPILACIÓN DEL FRONTEND (ANGULAR)
      # ==========================================
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './FrontendRestobarlasOlas/package-lock.json'

      - name: Install Frontend Dependencies & Build
        run: |
          npm ci
          npm run build -- --configuration=production
        working-directory: ${{ env.FRONTEND_DIR }}

      # ==========================================
      # FASE 2: INYECCIÓN DE ARTEFACTOS ESTÁTICOS
      # ==========================================
      - name: Inject Angular Dist into Spring Boot Static Folder
        run: |
          mkdir -p ${{ env.BACKEND_DIR }}/src/main/resources/static
          cp -r ${{ env.FRONTEND_DIR }}/dist/frontend-restobar-las-olas/* ${{ env.BACKEND_DIR }}/src/main/resources/static/

      # ==========================================
      # FASE 3: COMPILACIÓN DEL BACKEND (SPRING BOOT)
      # ==========================================
      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'
          cache: 'maven'

      - name: Build Fat JAR with Maven
        run: mvn clean package -DskipTests
        working-directory: ${{ env.BACKEND_DIR }}

      # ==========================================
      # FASE 4: PREPARACIÓN DEL ARTEFACTO FINAL
      # ==========================================
      - name: Upload Integrated JAR for Deployment
        uses: actions/upload-artifact@v4
        with:
          name: integrated-app
          path: ${{ github.workspace }}/${{ env.BACKEND_DIR }}/target/*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-package
    permissions:
      id-token: write
      contents: read
  
    steps:
      - name: Download Integrated JAR
        uses: actions/download-artifact@v4
        with:
          name: integrated-app
      
      - name: Login to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_7ACDB1E46F6C477085AFB2F0606EE6D9 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_ABB2FE20AF1441C98314B01182B3846C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_14FE2C8FAF7F4E39BEBFC68EC923B9C1 }}

      - name: Deploy Monolith to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: 'Production'
          package: '*.jar'
          